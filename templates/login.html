<!DOCTYPE html>
<html>

<head>

<title>AI Threat Detection System</title>

<style>

body {

background-color: #0f172a;

font-family: Arial;

color: white;

display: flex;

justify-content: center;

align-items: center;

height: 100vh;

}

.login-box {

background: #1e293b;

padding: 40px;

border-radius: 12px;

box-shadow: 0px 0px 20px #0ea5e9;

}

input {

width: 100%;

padding: 10px;

margin: 10px 0;

border-radius: 6px;

border: none;

}

button {

width: 100%;

padding: 10px;

background: #0ea5e9;

color: white;

border: none;

border-radius: 6px;

cursor: pointer;

}

button:hover {

background: #0284c7;

}

</style>

</head>

<body>

<div class="login-box">

<h2>AI Threat Detection Login</h2>

<form method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

</div>

</body>

</html>
